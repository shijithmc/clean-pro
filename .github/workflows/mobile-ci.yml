name: Mobile CI

on:
  push:
    branches: ['feat/**', 'fix/**', 'chore/**']
    paths: ['mobile/**', '.github/workflows/mobile-ci.yml']
  pull_request:
    branches: [main]
    paths: ['mobile/**']

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Verify formatting
        working-directory: mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --fatal-infos

      - name: Run tests
        working-directory: mobile
        run: flutter test --coverage --reporter=expanded

      # FA-040: enforce minimum 60% line-coverage threshold.
      # lcov is pre-installed on ubuntu-latest GitHub runners.
      - name: Check coverage threshold
        working-directory: mobile
        run: |
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 \
            | grep "lines" \
            | grep -oP '\d+\.\d+(?=%)' | head -1)
          echo "Line coverage: ${COVERAGE}%"
          if awk "BEGIN { exit !(${COVERAGE} < 60) }"; then
            echo "::error::Coverage ${COVERAGE}% is below the 60% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: mobile/coverage/lcov.info
          flags: mobile

  build-ios:
    name: Build iOS (no sign)
    runs-on: macos-latest
    needs: analyze-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: mobile
        # FA-039: --split-debug-info + --obfuscate — Dart symbols stripped from
        # the release binary and written to debug-info/ for Sentry de-obfuscation.
        run: flutter build ios --release --no-codesign
          --dart-define=RC_APPLE_API_KEY=${{ secrets.RC_APPLE_API_KEY }}
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=COGNITO_USER_POOL_ID=${{ vars.COGNITO_USER_POOL_ID }}
          --dart-define=COGNITO_CLIENT_ID=${{ vars.COGNITO_CLIENT_ID }}
          --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          --split-debug-info=debug-info
          --obfuscate

  build-android:
    # FA-038: build App Bundle (.aab) not APK — Play Store requires .aab;
    # APK is for sideload/testing only. App Bundle enables dynamic delivery
    # and reduces install size by ~20-40% via split APKs.
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    needs: analyze-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Android App Bundle
        working-directory: mobile
        # FA-038: appbundle replaces apk.
        # FA-039: --split-debug-info + --obfuscate strip symbols from the .aab
        # and write them to debug-info/ for Sentry de-obfuscation upload.
        run: flutter build appbundle --release
          --dart-define=RC_GOOGLE_API_KEY=${{ secrets.RC_GOOGLE_API_KEY }}
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=COGNITO_USER_POOL_ID=${{ vars.COGNITO_USER_POOL_ID }}
          --dart-define=COGNITO_CLIENT_ID=${{ vars.COGNITO_CLIENT_ID }}
          --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          --split-debug-info=debug-info
          --obfuscate
