name: Mobile CI

on:
  push:
    branches: ['feat/**', 'fix/**', 'chore/**']
    paths: ['mobile/**', '.github/workflows/mobile-ci.yml']
  pull_request:
    branches: [main]
    paths: ['mobile/**']

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Verify formatting
        working-directory: mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --fatal-infos

      - name: Run tests
        working-directory: mobile
        run: flutter test --coverage --reporter=expanded

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: mobile/coverage/lcov.info
          flags: mobile

  build-ios:
    name: Build iOS (no sign)
    runs-on: macos-latest
    needs: analyze-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: mobile
        run: flutter build ios --release --no-codesign
          --dart-define=RC_APPLE_API_KEY=${{ secrets.RC_APPLE_API_KEY }}
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=COGNITO_USER_POOL_ID=${{ vars.COGNITO_USER_POOL_ID }}
          --dart-define=COGNITO_CLIENT_ID=${{ vars.COGNITO_CLIENT_ID }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Get dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build Android APK
        working-directory: mobile
        run: flutter build apk --release
          --dart-define=RC_GOOGLE_API_KEY=${{ secrets.RC_GOOGLE_API_KEY }}
          --dart-define=API_BASE_URL=${{ vars.API_BASE_URL }}
          --dart-define=COGNITO_USER_POOL_ID=${{ vars.COGNITO_USER_POOL_ID }}
          --dart-define=COGNITO_CLIENT_ID=${{ vars.COGNITO_CLIENT_ID }}
