name: clean_pro
description: AI-powered duplicate photo cleaner for iOS and Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  bloc: ^8.1.4

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^14.6.3

  # Photo library access
  photo_manager: ^3.5.1

  # On-device ML
  tflite_flutter: ^0.10.4

  # Subscription / RevenueCat
  purchases_flutter: ^8.4.0

  # HTTP client
  dio: ^5.7.0
  # retrofit removed — no generated REST client used; plain Dio used directly.
  # amazon_cognito_identity_dart_2 removed — replaced by Amplify Auth SDK or
  #   direct Cognito calls via Dio; the dart_2 package is unmaintained.

  # Auth / secure storage
  flutter_secure_storage: ^9.2.3

  # BLoC concurrency helpers (FA-011: needed for concurrent cancel processing)
  bloc_concurrency: ^0.2.5

  # Local storage
  shared_preferences: ^2.3.3
  # hive_flutter removed — not used in any current feature; adds 1.5 MB binary
  # bloat for zero benefit. Revisit if offline caching is added later.

  # Permissions
  permission_handler: ^11.3.1

  # UI utilities
  # cached_network_image removed — app is entirely on-device; no network images
  #   are displayed. Removing saves ~300 KB and eliminates an unused network surface.
  shimmer: ^3.0.0
  lottie: ^3.1.3
  auto_size_text: ^3.0.0

  # Utilities
  json_annotation: ^4.9.0
  intl: ^0.20.2
  logger: ^2.4.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mockito: ^5.4.4
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
    - assets/animations/
